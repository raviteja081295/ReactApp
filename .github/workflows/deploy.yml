name: Hello World

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run tests (generate coverage)
      - name: Run tests
        run: npm run test:ci 

      # Fix Windows backslash issue
      - name: Fix coverage slashes
        run: |
          sed -i 's|\\|/|g' coverage/lcov.info

      # 🔥 CRITICAL FIX (absolute path mapping)
      - name: Fix coverage absolute paths
        run: |
          sed -i "s|SF:src/|SF:/home/runner/work/${{ github.repository }}/src/|g" coverage/lcov.info

      # Debug (keep for verification)
      - name: Debug coverage
        run: |
          echo "---- LCOV CONTENT ----"
          cat coverage/lcov.info | head -n 20

      # Install Sonar Scanner
      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      # SonarCloud scan
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

      # Build
      - name: Build app
        run: npm run build