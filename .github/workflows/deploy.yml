name: Hello World

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run tests (generate coverage)
      - name: Run tests
        run: npm run test:ci 

      # ✅ Fix ONLY slashes (Windows → Linux)
      - name: Fix coverage slashes
        run: |
          sed -i 's|\\|/|g' coverage/lcov.info

      # ✅ Debug: verify paths (IMPORTANT)
      - name: Verify lcov paths
        run: |
          echo "---- LCOV PATHS ----"
          grep SF coverage/lcov.info || true

      # Install Sonar Scanner
      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      # SonarCloud Scan
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=raviteja081295_TinderApp \
            -Dsonar.organization=raviteja081295 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.sources=src \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      # Build
      - name: Build app
        run: npm run build