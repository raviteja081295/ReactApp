name: Hello World

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci 

      # ✅ Optional but useful (keep for now)
      - name: Debug - Verify coverage
        run: |
          ls -la coverage || echo "No coverage folder"
          cat coverage/lcov.info | head -n 10 || echo "No lcov file"

      - name: Debug - Verify token exists
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "ERROR: SONAR_TOKEN is empty!"
            exit 1
          else
            echo "✓ SONAR_TOKEN is set"
          fi

      # ❌ REMOVE Docker Sonar action
      # ✅ USE CLI INSTEAD (this fixes your error)
      - name: Install Sonar Scanner
        run: npm install -g sonar-scanner

      - name: SonarCloud Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=raviteja081295_TinderApp \
            -Dsonar.organization=raviteja081295 \
            -Dsonar.sources=src \
            -Dsonar.exclusions=node_modules/** \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Build app
        run: npm run build