name: Hello World

on:
  push:
    branches: ["main"]

jobs:
    build:
      runs-on: ubuntu-latest

      steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: v24.14.1
      
      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

