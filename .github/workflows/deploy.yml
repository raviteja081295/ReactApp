name: Hello World

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test -- --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@3d1e3d8f0e8f6f9c3b3e8c8e3a0b9f3d8c3a1e2f
        with:
          args: >
            -Dsonar.projectKey=raviteja081295_ReactApp
            -Dsonar.organization=raviteja081295
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build app
        run: npm run build